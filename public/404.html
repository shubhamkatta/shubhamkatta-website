<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Redirecting...</title>
    <script>
      // SPA redirect: GitHub Pages serves 404.html for unknown routes
      // This redirects to index.html with the path preserved as a query param
      var path = window.location.pathname + window.location.search + window.location.hash;
      window.location.replace('/' + '?p=' + encodeURIComponent(path));
    </script>
  </head>
  <body></body>
</html>
