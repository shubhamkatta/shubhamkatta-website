<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="RAG failure modes by stage">
  <rect width="1000" height="440" fill="#fff8ef"/>
  <text x="40" y="44" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Where each RAG stage actually breaks</text>
  <text x="40" y="68" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">aggregate "answer quality" is misleading. diagnose per stage.</text>
  <g transform="translate(40,100)">
    <rect width="140" height="64" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">INGEST</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">duplicates,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">stale snapshots</text>
  </g>
  <g transform="translate(196,100)">
    <rect width="140" height="64" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PARSE</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">tables flattened,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">PDFs lose order</text>
  </g>
  <g transform="translate(352,100)">
    <rect width="140" height="64" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">CHUNK</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">cuts answer in half,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">no overlap context</text>
  </g>
  <g transform="translate(508,100)">
    <rect width="140" height="64" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">EMBED</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">model mismatch,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">stale index</text>
  </g>
  <g transform="translate(664,100)">
    <rect width="140" height="64" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">RETRIEVE</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">low recall,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#1d1815">duplicate top-k</text>
  </g>
  <g transform="translate(820,100)">
    <rect width="140" height="64" rx="12" fill="#1d1815"/>
    <text x="12" y="24" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="2">GENERATE</text>
    <text x="12" y="46" font-family="Inter, sans-serif" font-size="12" fill="#f6efe6">hallucinates,</text>
    <text x="12" y="60" font-family="Inter, sans-serif" font-size="12" fill="#f6efe6">ignores ctx</text>
  </g>
  <g transform="translate(40,200)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">A SIGNAL THAT POINTS TO THE RIGHT STAGE</text>
  </g>
  <g transform="translate(40,230)" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.78)">
    <text x="0" y="0">• "I can see the right paragraph in the doc; the model doesn't get it" → retrieve or rerank</text>
    <text x="0" y="22">• "The right paragraph isn't even in the top-50" → embed, chunk, or query rewrite</text>
    <text x="0" y="44">• "The chunk has the answer but it's mid-sentence with no context" → chunk</text>
    <text x="0" y="66">• "The page exists but the parser dropped the table" → parse</text>
    <text x="0" y="88">• "The same answer appears 12 times in different forms" → ingest (dedup)</text>
    <text x="0" y="110">• "Top-k looks great; the model still makes things up" → generate (prompt / citations / temperature)</text>
  </g>
  <text x="40" y="412" font-family="Inter, sans-serif" font-size="12" fill="rgba(29,24,21,0.55)">If your only metric is "did the answer look right," you'll fix the wrong stage and ship slowly.</text>
</svg>
