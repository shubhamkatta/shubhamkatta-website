<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Some truths arrive wearing jokes">
  <rect width="1200" height="600" fill="#fff6db"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#ffe9e4" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(140,180)">
    <rect x="0" y="0" width="280" height="200" rx="20" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="140" y="40" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="rgba(29,24,21,0.5)" letter-spacing="2">JOKE</text>
    <text x="140" y="84" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#1d1815">"…anyway,"</text>
    <text x="140" y="116" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#1d1815">"the planning is</text>
    <text x="140" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#1d1815">a vibe at this point."</text>
    <text x="140" y="180" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.55)">[everyone laughs. nobody disagrees.]</text>
    <path d="M 240 60 Q 280 60 280 100" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="4,4"/>
    <g transform="translate(280,90)">
      <rect width="160" height="40" rx="20" fill="#ff6b6b"/>
      <text x="80" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#fff">truth, smuggled in</text>
    </g>
  </g>
  <g transform="translate(110,460)">
    <text x="0" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="42" fill="#1d1815" letter-spacing="-2">Some truths arrive wearing jokes.</text>
  </g>
