<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chip the golden retriever and MCP: one standard clip that snaps onto any toy, door, or tool">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">MCP: one standard clip that snaps onto any toy, any door, any tool.</text>
  <!-- Chip head -->
  <g transform="translate(140,196) scale(0.84)">
    <ellipse cx="0" cy="92" rx="76" ry="15" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="-21" cy="-11" r="3" fill="#fff"/>
    <circle cx="27" cy="-11" r="3" fill="#fff"/>
    <path d="M -36 -22 Q -24 -28 -12 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -22 Q 24 -28 36 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <path d="M 0 27 L 0 38 M 0 38 Q -16 50 -28 40 M 0 38 Q 16 50 28 40" fill="none" stroke="#1d1815" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- the universal clip hub -->
  <g transform="translate(396,156)">
    <circle r="40" fill="#ff6b6b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -14 -10 a 14 14 0 1 0 0 20 l 0 -7 a 7 7 0 1 1 0 -6 Z" fill="#fff" stroke="#1d1815" stroke-width="1.5"/>
    <path d="M 14 -10 a 14 14 0 1 1 0 20 l 0 -7 a 7 7 0 1 0 0 -6 Z" fill="#fff" stroke="#1d1815" stroke-width="1.5"/>
    <text x="0" y="60" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="#1d1815" letter-spacing="1">MCP CLIP</text>
  </g>
  <!-- tools it clips onto -->
  <g font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#1d1815">
    <g transform="translate(560,96)"><rect width="120" height="38" rx="10" fill="#c6e84b" stroke="#1d1815" stroke-width="2"/><text x="60" y="24" text-anchor="middle">the ball</text></g>
    <g transform="translate(560,150)"><rect width="120" height="38" rx="10" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/><text x="60" y="24" text-anchor="middle">the door</text></g>
    <g transform="translate(560,204)"><rect width="120" height="38" rx="10" fill="#fff6db" stroke="#1d1815" stroke-width="2"/><text x="60" y="24" text-anchor="middle">the frisbee</text></g>
  </g>
  <g stroke="#1d1815" stroke-width="2.5" fill="none">
    <path d="M 436 150 L 560 116"/>
    <path d="M 440 156 L 560 169"/>
    <path d="M 436 164 L 560 220"/>
  </g>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">one clip fits everything — so the smart dog connects to any tool the same way, and humans can easily check what it is allowed to clip onto. that checking part is governance.</text>
</svg>
