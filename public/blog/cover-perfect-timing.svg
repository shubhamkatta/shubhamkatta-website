<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The myth of perfect timing">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="540" y="30" width="160" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 620 41)"/>
  <g transform="translate(140,170)">
    <circle cx="160" cy="160" r="160" fill="#fff" stroke="#1d1815" stroke-width="3"/>
    <line x1="160" y1="40" x2="160" y2="60" stroke="#1d1815" stroke-width="3"/>
    <line x1="160" y1="260" x2="160" y2="280" stroke="#1d1815" stroke-width="3"/>
    <line x1="40" y1="160" x2="60" y2="160" stroke="#1d1815" stroke-width="3"/>
    <line x1="260" y1="160" x2="280" y2="160" stroke="#1d1815" stroke-width="3"/>
    <line x1="160" y1="160" x2="160" y2="80" stroke="#1d1815" stroke-width="5" stroke-linecap="round"/>
    <line x1="160" y1="160" x2="220" y2="200" stroke="#ff6b6b" stroke-width="5" stroke-linecap="round"/>
    <circle cx="160" cy="160" r="6" fill="#1d1815"/>
    <text x="80" y="100" font-family="Inter, sans-serif" font-size="22" font-weight="900" fill="#ff6b6b" opacity="0.7">?</text>
    <text x="220" y="110" font-family="Inter, sans-serif" font-size="28" font-weight="900" fill="#ff6b6b" opacity="0.55">?</text>
    <text x="60" y="220" font-family="Inter, sans-serif" font-size="20" font-weight="900" fill="#ff6b6b" opacity="0.5">?</text>
    <text x="240" y="240" font-family="Inter, sans-serif" font-size="24" font-weight="900" fill="#ff6b6b" opacity="0.6">?</text>
  </g>
  <g transform="translate(560,200)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">The myth of</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">perfect timing.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">most life offers costly windows.</text>
    <path d="M 0 200 Q 100 188 200 204" stroke="#1d1815" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>
</svg>
