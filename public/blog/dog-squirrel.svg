<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chip the golden retriever guarding a plastic bag he is certain is a squirrel">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">the generator says &#8220;squirrel.&#8221; the verifier goes and looks.</text>
  <!-- Chip head -->
  <g transform="translate(190,190) scale(1.05)">
    <ellipse cx="0" cy="92" rx="78" ry="16" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="-21" cy="-11" r="3" fill="#fff"/>
    <circle cx="27" cy="-11" r="3" fill="#fff"/>
    <path d="M -36 -22 Q -24 -28 -12 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -22 Q 24 -28 36 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <path d="M 0 27 L 0 38 M 0 38 Q -16 50 -28 40 M 0 38 Q 16 50 28 40" fill="none" stroke="#1d1815" stroke-width="2.5" stroke-linecap="round"/>
  </g>
  <!-- plastic bag -->
  <g transform="translate(470,222)">
    <path d="M 0 60 Q -14 6 30 0 Q 24 -34 60 -30 Q 96 -36 92 0 Q 132 8 116 60 Q 60 76 0 60 Z" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5" opacity="0.92"/>
    <path d="M 26 14 Q 60 28 92 14 M 36 34 Q 60 44 84 32" fill="none" stroke="rgba(29,24,21,0.35)" stroke-width="2" stroke-linecap="round"/>
    <text x="58" y="92" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="rgba(29,24,21,0.55)">a plastic bag</text>
  </g>
  <!-- thought bubble: squirrel -->
  <g transform="translate(300,40)">
    <circle cx="6" cy="92" r="6" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <circle cx="22" cy="80" r="9" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="120" cy="46" rx="120" ry="44" fill="#fff" stroke="#1d1815" stroke-width="2.5"/>
    <!-- squirrel -->
    <g transform="translate(40,18)">
      <path d="M 44 46 Q 78 46 76 20 Q 72 -8 50 -2 Q 64 10 56 28 Z" fill="#c98a4b" stroke="#1d1815" stroke-width="2"/>
      <ellipse cx="34" cy="38" rx="19" ry="15" fill="#c98a4b" stroke="#1d1815" stroke-width="2"/>
      <circle cx="17" cy="25" r="10" fill="#c98a4b" stroke="#1d1815" stroke-width="2"/>
      <path d="M 10 15 Q 7 7 14 11 Z" fill="#c98a4b" stroke="#1d1815" stroke-width="1.5"/>
      <circle cx="14" cy="24" r="2.5" fill="#1d1815"/>
