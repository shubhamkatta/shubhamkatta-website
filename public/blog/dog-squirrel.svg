    </g>
    <text x="150" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="14" fill="#1d1815">100% a squirrel.</text>
  </g>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">Chip proposes with total confidence. the honest, boring verifier confirms: no — plastic bag. you never let the excitable one decide.</text>
</svg>
