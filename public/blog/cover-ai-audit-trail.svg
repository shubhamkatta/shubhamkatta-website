<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The AI audit trail: what to log and why it matters">
  <rect width="1200" height="600" fill="#fff6db"/>
  <rect x="520" y="32" width="200" height="20" rx="4" fill="#eaf7ff" opacity="0.9" transform="rotate(-1.5 620 42)"/>
  <g transform="translate(90,110) rotate(-1.5)">
    <rect width="480" height="380" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="22" y="36" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">AUDIT LOG VIEWER</text>
    <line x1="22" y1="50" x2="458" y2="50" stroke="rgba(29,24,21,0.18)"/>
    <!-- Log entry rows -->
    <g font-family="ui-monospace, monospace" font-size="12" fill="#1d1815">
      <g transform="translate(22,62)">
        <rect width="436" height="32" rx="8" fill="#eaf7ff" stroke="#1d1815" stroke-width="1.5"/>
        <text x="10" y="14" font-size="9" fill="rgba(29,24,21,0.5)" font-family="Inter, sans-serif" font-weight="800" letter-spacing="1">FIELD</text>
        <text x="180" y="14" font-size="9" fill="rgba(29,24,21,0.5)" font-family="Inter, sans-serif" font-weight="800" letter-spacing="1">VALUE</text>
        <text x="10" y="26" font-weight="700" font-size="11" fill="#1d1815">timestamp</text>
        <text x="180" y="26" font-size="11" fill="#1d1815">2026-06-25T14:22:08Z</text>
      </g>
      <g transform="translate(22,100)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">action</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">tool.database_query</text>
      </g>
      <g transform="translate(22,132)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">model</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">claude-opus-4-20250514</text>
      </g>
      <g transform="translate(22,164)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">input_hash</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">sha256:a3f8c1…</text>
      </g>
      <g transform="translate(22,196)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">output_hash</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">sha256:7b29d4…</text>
      </g>
      <g transform="translate(22,228)">
        <rect width="436" height="28" rx="8" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">decision</text>
        <text x="180" y="19" font-size="11" font-weight="700" fill="#1d1815">allow</text>
      </g>
      <g transform="translate(22,260)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">latency_ms</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">342</text>
      </g>
      <g transform="translate(22,292)">
        <rect width="436" height="28" rx="8" fill="rgba(29,24,21,0.04)"/>
        <text x="10" y="19" font-weight="700" font-size="11" fill="#1d1815">cost_usd</text>
        <text x="180" y="19" font-size="11" fill="#1d1815">0.0087</text>
      </g>
    </g>
    <text x="22" y="354" font-family="Inter, sans-serif" font-size="12" fill="rgba(29,24,21,0.5)">every event. immutable. queryable.</text>
  </g>
  <g transform="translate(620,180)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">The AI</text>
    <text x="0" y="112" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">audit trail.</text>
    <text x="0" y="162" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">what to log and why.</text>
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="16" fill="rgba(29,24,21,0.7)">when someone asks what the AI did,</text>
    <text x="0" y="244" font-family="Inter, sans-serif" font-size="16" fill="rgba(29,24,21,0.7)">the answer should be a query,</text>
    <text x="0" y="268" font-family="Inter, sans-serif" font-size="16" fill="rgba(29,24,21,0.7)">not an investigation.</text>
  </g>
</svg>