<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chip the golden retriever, a ball launcher, and the fairness of a rate limiter">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">one launcher, five dogs — the rate limiter is just fairness with a cooldown.</text>
  <!-- Chip head, looking up eager -->
  <g transform="translate(170,200) scale(1.0)">
    <ellipse cx="0" cy="92" rx="76" ry="15" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-10" r="10" fill="#1d1815"/>
    <circle cx="24" cy="-10" r="10" fill="#1d1815"/>
    <circle cx="-20" cy="-14" r="3.5" fill="#fff"/>
    <circle cx="28" cy="-14" r="3.5" fill="#fff"/>
    <path d="M -36 -26 Q -24 -34 -12 -28" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -28 Q 24 -34 36 -26" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <path d="M 0 27 L 0 36 M 0 36 Q -18 52 -30 40 M 0 36 Q 18 52 30 40" fill="none" stroke="#1d1815" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -10 40 Q 0 60 10 40 Q 5 50 0 50 Q -5 50 -10 40 Z" fill="#ff9bb0" stroke="#1d1815" stroke-width="2"/>
  </g>
  <!-- ball launcher machine -->
  <g transform="translate(470,138)">
    <rect x="0" y="60" width="150" height="78" rx="14" fill="#1d1815"/>
    <text x="75" y="106" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="rgba(255,255,255,0.55)" letter-spacing="1">LAUNCHER</text>
    <text x="75" y="124" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#a3e4a3">3 / min</text>
    <!-- hopper -->
    <path d="M 30 60 L 50 24 L 100 24 L 120 60 Z" fill="#fff6db" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="62" cy="44" r="9" fill="#c6e84b" stroke="#1d1815" stroke-width="1.5"/>
    <circle cx="84" cy="40" r="9" fill="#c6e84b" stroke="#1d1815" stroke-width="1.5"/>
    <!-- tube -->
    <rect x="118" y="40" width="46" height="20" rx="8" fill="#ff6b6b" stroke="#1d1815" stroke-width="2.5" transform="rotate(-24 118 50)"/>
  </g>
  <!-- launched ball with arc -->
  <path d="M 620 134 Q 690 78 720 118" fill="none" stroke="rgba(29,24,21,0.4)" stroke-width="2.5" stroke-dasharray="5,6"/>
  <g transform="translate(712,118)">
    <circle r="13" fill="#c6e84b" stroke="#1d1815" stroke-width="2"/>
    <path d="M -10 -6 Q 0 0 -10 6 M 10 -6 Q 0 0 10 6" fill="none" stroke="#fff" stroke-width="1.6"/>
  </g>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">each dog gets a fair number of throws per minute. the greedy one hits its limit and waits — everyone still gets balls.</text>
</svg>
