<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The emotional side of good engineering">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#ffe9e4" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(140,170)">
    <circle cx="120" cy="120" r="100" fill="none" stroke="#1d1815" stroke-width="3"/>
    <circle cx="120" cy="120" r="22" fill="#fff" stroke="#1d1815" stroke-width="3"/>
    <g stroke="#1d1815" stroke-width="3" fill="none">
      <line x1="120" y1="20" x2="120" y2="40"/>
      <line x1="120" y1="200" x2="120" y2="220"/>
      <line x1="20" y1="120" x2="40" y2="120"/>
      <line x1="200" y1="120" x2="220" y2="120"/>
      <line x1="50" y1="50" x2="64" y2="64"/>
      <line x1="176" y1="176" x2="190" y2="190"/>
      <line x1="190" y1="50" x2="176" y2="64"/>
      <line x1="64" y1="176" x2="50" y2="190"/>
    </g>
    <path d="M 90 110 Q 100 90 120 100 Q 140 90 150 110 Q 150 135 120 150 Q 90 135 90 110 Z" fill="#ff6b6b"/>
  </g>
  <g transform="translate(450,200)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">The emotional side</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">of good engineering.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">systems are technical. building them is human.</text>
  </g>
</svg>
