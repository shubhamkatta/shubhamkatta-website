<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Claude Code in production cover">
  <rect width="1200" height="600" fill="#fff6db"/>
  <g transform="translate(80,140) rotate(-2)">
    <rect width="480" height="320" rx="22" fill="#1d1815"/>
    <circle cx="22" cy="22" r="6" fill="#ff6b6b"/>
    <circle cx="42" cy="22" r="6" fill="#ffd166"/>
    <circle cx="62" cy="22" r="6" fill="#a3e4a3"/>
    <text x="22" y="80" fill="#9eb7ff" font-family="ui-monospace, monospace" font-size="16">~/repo $ claude</text>
    <text x="22" y="110" fill="#a3e4a3" font-family="ui-monospace, monospace" font-size="14">✓ CLAUDE.md loaded · 4 sections</text>
    <text x="22" y="134" fill="#a3e4a3" font-family="ui-monospace, monospace" font-size="14">✓ permissions: skim · run · edit</text>
    <text x="22" y="158" fill="#a3e4a3" font-family="ui-monospace, monospace" font-size="14">✓ hooks: pre-commit-format · stop-tts</text>
