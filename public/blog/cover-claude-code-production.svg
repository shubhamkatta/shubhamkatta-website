    <text x="22" y="206" fill="#a3e4a3" font-family="ui-monospace, monospace" font-size="14">✓ mcp: github · postgres · linear</text>
    <text x="22" y="248" fill="#f6efe6" font-family="ui-monospace, monospace" font-size="15">&gt; ship the auth fix</text>
    <rect x="22" y="262" width="380" height="6" rx="3" fill="rgba(255,255,255,0.18)"/>
    <rect x="22" y="274" width="220" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  </g>
  <g transform="translate(630,160)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">Claude Code,</text>
    <text x="0" y="118" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">in production.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">a field guide.</text>
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">CLAUDE.md, permissions, hooks, skills,</text>
    <text x="0" y="246" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">and the boring habits that keep things</text>
    <text x="0" y="272" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">from breaking at 4pm on a Friday.</text>
