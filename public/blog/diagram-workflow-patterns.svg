<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Five agentic workflow patterns">
  <rect width="1000" height="460" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Five patterns that cover most production "agentic" systems</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">pick by shape, not by buzzword</text>
  <g transform="translate(40,100)" stroke="#1d1815" stroke-width="2">
    <g>
      <rect x="0" y="0" width="280" height="120" rx="14" fill="#fff"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">01 · PROMPT CHAINING</text>
      <rect x="14" y="42" width="60" height="32" rx="6" fill="#ffe9e4"/>
      <line x1="74" y1="58" x2="98" y2="58"/>
      <rect x="98" y="42" width="60" height="32" rx="6" fill="#ffe9e4"/>
      <line x1="158" y1="58" x2="182" y2="58"/>
      <rect x="182" y="42" width="60" height="32" rx="6" fill="#ffe9e4"/>
      <text x="14" y="98" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)" stroke="none">step A → step B → step C. each step is a model call.</text>
    </g>
    <g transform="translate(300,0)">
      <rect width="280" height="120" rx="14" fill="#fff"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">02 · ROUTING</text>
      <rect x="14" y="42" width="60" height="32" rx="6" fill="#fff6db"/>
      <line x1="74" y1="58" x2="110" y2="42"/>
      <line x1="74" y1="58" x2="110" y2="58"/>
      <line x1="74" y1="58" x2="110" y2="74"/>
      <rect x="110" y="30" width="60" height="20" rx="4" fill="#fff6db"/>
      <rect x="110" y="52" width="60" height="20" rx="4" fill="#fff6db"/>
      <rect x="110" y="74" width="60" height="20" rx="4" fill="#fff6db"/>
      <text x="14" y="98" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)" stroke="none">a classifier picks which branch handles this input.</text>
    </g>
    <g transform="translate(600,0)">
      <rect width="280" height="120" rx="14" fill="#fff"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">03 · PARALLELIZATION</text>
      <rect x="14" y="42" width="50" height="32" rx="6" fill="#eaf7ff"/>
      <line x1="64" y1="58" x2="100" y2="34"/>
      <line x1="64" y1="58" x2="100" y2="58"/>
      <line x1="64" y1="58" x2="100" y2="82"/>
      <rect x="100" y="22" width="50" height="24" rx="6" fill="#eaf7ff"/>
      <rect x="100" y="48" width="50" height="24" rx="6" fill="#eaf7ff"/>
      <rect x="100" y="74" width="50" height="24" rx="6" fill="#eaf7ff"/>
      <line x1="150" y1="34" x2="186" y2="58"/>
      <line x1="150" y1="60" x2="186" y2="58"/>
      <line x1="150" y1="86" x2="186" y2="58"/>
      <rect x="186" y="42" width="50" height="32" rx="6" fill="#eaf7ff"/>
      <text x="14" y="98" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)" stroke="none">fan out independent subtasks; aggregate at the end.</text>
    </g>
    <g transform="translate(0,150)">
      <rect width="420" height="120" rx="14" fill="#fff"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">04 · ORCHESTRATOR-WORKERS</text>
      <rect x="180" y="40" width="60" height="26" rx="6" fill="#1d1815"/>
      <text x="210" y="56" text-anchor="middle" font-family="ui-monospace, monospace" font-size="10" fill="#a3e4a3" stroke="none">orchestrator</text>
      <line x1="190" y1="66" x2="40" y2="84"/>
      <line x1="200" y1="66" x2="120" y2="84"/>
      <line x1="210" y1="66" x2="200" y2="84"/>
      <line x1="220" y1="66" x2="280" y2="84"/>
      <line x1="230" y1="66" x2="360" y2="84"/>
      <rect x="20" y="84" width="40" height="20" rx="4" fill="#fff6db"/>
      <rect x="100" y="84" width="40" height="20" rx="4" fill="#fff6db"/>
      <rect x="180" y="84" width="40" height="20" rx="4" fill="#fff6db"/>
      <rect x="260" y="84" width="40" height="20" rx="4" fill="#fff6db"/>
      <rect x="340" y="84" width="40" height="20" rx="4" fill="#fff6db"/>
      <text x="14" y="116" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)" stroke="none">an orchestrator decides what to do and delegates to specialist workers.</text>
    </g>
    <g transform="translate(440,150)">
      <rect width="440" height="120" rx="14" fill="#fff"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">05 · EVALUATOR-OPTIMIZER</text>
      <rect x="40" y="46" width="80" height="28" rx="6" fill="#ffe9e4"/>
      <text x="80" y="63" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815" stroke="none">generate</text>
      <line x1="120" y1="60" x2="200" y2="60"/>
      <polygon points="200,60 192,56 192,64" fill="#1d1815" stroke="none"/>
      <rect x="200" y="46" width="80" height="28" rx="6" fill="#1d1815"/>
      <text x="240" y="63" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#a3e4a3" stroke="none">evaluate</text>
      <line x1="280" y1="60" x2="360" y2="60"/>
      <rect x="360" y="46" width="60" height="28" rx="6" fill="#a3e4a3"/>
      <text x="390" y="63" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815" stroke="none">ship</text>
      <path d="M 280 74 Q 200 100 80 74" stroke-dasharray="4,4"/>
      <text x="14" y="116" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)" stroke="none">generate, judge, revise. loop until the judge accepts.</text>
    </g>
  </g>
  <g transform="translate(40,400)" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.78)">
    <text x="0" y="0">These compose. A real system is often "routing → orchestrator-workers → evaluator-optimizer on each branch."</text>
    <text x="0" y="22">Resist the urge to call all five "an agent." Each has different operational properties; "agent" is the smallest helpful word.</text>
  </g>
</svg>
