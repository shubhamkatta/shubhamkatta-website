      <rect x="300" y="0" width="160" height="24" rx="4" fill="#9ec5ff" stroke="#1d1815" stroke-width="1"/>
      <text x="-4" y="18" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">semantic</text>
    </g>
    <g transform="translate(20,180)">
      <rect width="460" height="24" rx="4" fill="rgba(29,24,21,0.05)"/>
      <rect x="0" y="0" width="460" height="6" rx="3" fill="#1d1815"/>
      <rect x="0" y="8" width="80" height="14" rx="3" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <rect x="84" y="8" width="80" height="14" rx="3" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <rect x="168" y="8" width="80" height="14" rx="3" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <rect x="252" y="8" width="80" height="14" rx="3" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <rect x="336" y="8" width="80" height="14" rx="3" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <text x="-4" y="18" text-anchor="end" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">parent-child</text>
    </g>
    <text x="20" y="240" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">same input, four very different recall and precision profiles.</text>
  </g>
  <g transform="translate(620,220)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">Chunking,</text>
