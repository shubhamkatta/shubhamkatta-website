    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">knob in RAG.</text>
    <text x="0" y="216" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#ff6b6b">strategies, trade-offs, real numbers.</text>
  </g>
