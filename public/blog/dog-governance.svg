<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chip the golden retriever waiting politely beside a rulebook and a treat">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">governance: check the rulebook, get a human to sign off, write it all down.</text>
  <!-- Chip head, sitting politely -->
  <g transform="translate(180,200) scale(1.0)">
    <ellipse cx="0" cy="92" rx="76" ry="15" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="-21" cy="-11" r="3" fill="#fff"/>
    <circle cx="27" cy="-11" r="3" fill="#fff"/>
    <path d="M -36 -22 Q -24 -28 -12 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -22 Q 24 -28 36 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <path d="M 0 27 L 0 38 M 0 38 Q -16 50 -28 40 M 0 38 Q 16 50 28 40" fill="none" stroke="#1d1815" stroke-width="2.5" stroke-linecap="round"/>
    <!-- collar -->
    <path d="M -52 50 Q 0 78 52 50" fill="none" stroke="#ff6b6b" stroke-width="8" stroke-linecap="round"/>
    <circle cx="0" cy="68" r="8" fill="#ffd166" stroke="#1d1815" stroke-width="2"/>
  </g>
  <!-- rulebook -->
  <g transform="translate(430,150)">
    <rect x="0" y="0" width="120" height="100" rx="8" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/>
    <rect x="0" y="0" width="22" height="100" rx="8" fill="#1d1815"/>
    <text x="74" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="#1d1815" letter-spacing="1">RULE</text>
    <text x="74" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="#1d1815" letter-spacing="1">BOOK</text>
    <path d="M 40 68 L 104 68 M 40 80 L 104 80" stroke="rgba(29,24,21,0.4)" stroke-width="2"/>
  </g>
  <!-- human sign-off checklist -->
  <g transform="translate(580,150)">
    <rect x="0" y="0" width="150" height="100" rx="10" fill="#fff" stroke="#1d1815" stroke-width="2.5"/>
    <text x="14" y="26" font-family="Inter, sans-serif" font-weight="800" font-size="11" fill="#1d1815">human sign-off</text>
    <g font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.7)">
      <rect x="14" y="38" width="12" height="12" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
      <path d="M 17 44 l 3 3 l 5 -6" fill="none" stroke="#1d1815" stroke-width="1.6"/>
      <text x="34" y="48">checked rules</text>
      <rect x="14" y="58" width="12" height="12" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
      <path d="M 17 64 l 3 3 l 5 -6" fill="none" stroke="#1d1815" stroke-width="1.6"/>
      <text x="34" y="68">human approved</text>
      <rect x="14" y="78" width="12" height="12" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
      <path d="M 17 84 l 3 3 l 5 -6" fill="none" stroke="#1d1815" stroke-width="1.6"/>
      <text x="34" y="88">logged it all</text>
    </g>
  </g>
  <!-- treat (bone) -->
  <g transform="translate(312,150)">
    <ellipse cx="28" cy="15" rx="20" ry="9" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="9" cy="8" r="8" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="9" cy="22" r="8" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="47" cy="8" r="8" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="47" cy="22" r="8" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="28" cy="15" rx="15" ry="6" fill="#fdebc8"/>
    <text x="28" y="50" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="rgba(29,24,21,0.55)">then: treat</text>
  </g>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">the agent proposes, the rules decide, every action is logged, the scary actions need a human. Chip sits. Chip waits. Chip gets the treat.</text>
</svg>
