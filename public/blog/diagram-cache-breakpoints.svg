<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" role="img" aria-label="Prompt caching breakpoints">
  <rect width="1000" height="380" fill="#fff8ef"/>
  <text x="40" y="48" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Where to put the four cache breakpoints</text>
  <text x="40" y="72" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">order matters: a turn invalidates everything below it</text>
  <g transform="translate(40,100)">
    <rect width="900" height="48" rx="10" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">system prompt + role + global rules</text>
    <rect x="800" y="10" width="86" height="28" rx="8" fill="#a3e4a3"/>
    <text x="812" y="30" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#1d1815">cache #1</text>
  </g>
  <g transform="translate(40,162)">
    <rect width="900" height="48" rx="10" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">tool definitions (don't change between turns)</text>
    <rect x="800" y="10" width="86" height="28" rx="8" fill="#a3e4a3"/>
    <text x="812" y="30" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#1d1815">cache #2</text>
  </g>
  <g transform="translate(40,224)">
    <rect width="900" height="48" rx="10" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">large docs / runbooks the agent will reference</text>
    <rect x="800" y="10" width="86" height="28" rx="8" fill="#a3e4a3"/>
    <text x="812" y="30" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#1d1815">cache #3</text>
  </g>
  <g transform="translate(40,286)">
    <rect width="900" height="48" rx="10" fill="#1d1815"/>
    <text x="16" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#f6efe6">conversation so far + most recent turn</text>
    <rect x="800" y="10" width="86" height="28" rx="8" fill="#ff6b6b"/>
    <text x="828" y="30" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#fff">fresh</text>
  </g>
  <text x="40" y="358" font-family="Inter, sans-serif" font-size="12" fill="rgba(29,24,21,0.55)">5-min TTL on each block. The cheapest message is one where only the bottom row is fresh.</text>
</svg>
