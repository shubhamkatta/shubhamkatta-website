<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="The RAG eval loop: sample production output, score it, dashboard it, alert on regression, fix, repeat">
  <rect width="1000" height="440" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">The eval loop: grade a sample of every answer, catch drift before users do</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">You do not grade every answer (too expensive). You grade a sample, watch the trend, and page someone when it drops.</text>
  <!-- the three metrics -->
  <text x="40" y="108" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="rgba(29,24,21,0.4)" letter-spacing="2">THE THREE GRADES</text>
  <g font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">
    <g transform="translate(40,122)">
      <rect width="290" height="82" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2.5"/>
      <text x="18" y="28">faithfulness</text>
      <text x="18" y="48" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">is the answer supported by the retrieved context?</text>
      <text x="18" y="68" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">or is it making things up from training data?</text>
    </g>
    <g transform="translate(350,122)">
      <rect width="290" height="82" rx="14" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/>
      <text x="18" y="28">answer relevancy</text>
      <text x="18" y="48" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">does the answer address what was asked?</text>
      <text x="18" y="68" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">or did the model wander off-topic?</text>
    </g>
    <g transform="translate(660,122)">
      <rect width="300" height="82" rx="14" fill="#a3e4a3" stroke="#1d1815" stroke-width="2.5"/>
      <text x="18" y="28">context recall</text>
      <text x="18" y="48" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">did retrieval actually find the documents</text>
      <text x="18" y="68" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">that contain the answer?</text>
    </g>
  </g>
  <!-- the loop -->
  <text x="40" y="254" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="rgba(29,24,21,0.4)" letter-spacing="2">THE LOOP</text>
  <g font-family="Inter, sans-serif" font-weight="800" font-size="12" fill="#1d1815">
    <g transform="translate(40,268)">
      <rect width="150" height="64" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2.5"/>
      <text x="14" y="28">production output</text>
      <text x="14" y="48" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">answers flowing 24/7</text>
    </g>
    <g transform="translate(220,268)">
      <rect width="150" height="64" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/>
      <text x="14" y="28">sample ~2%</text>
      <text x="14" y="48" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">random, async</text>
    </g>
    <g transform="translate(400,268)">
      <rect width="150" height="64" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2.5"/>
      <text x="14" y="28">score (RAGAS)</text>
      <text x="14" y="48" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">three grades per sample</text>
    </g>
    <g transform="translate(580,268)">
      <rect width="150" height="64" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2.5"/>
      <text x="14" y="28">dashboard</text>
      <text x="14" y="48" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">trend over time</text>
    </g>
    <g transform="translate(760,268)">
      <rect width="200" height="64" rx="12" fill="#1d1815"/>
      <text x="14" y="28" fill="#f6efe6">regression? page someone</text>
      <text x="14" y="48" font-weight="400" font-size="10" fill="#a3e4a3">24h window drops → alert</text>
    </g>
  </g>
  <g stroke="#1d1815" stroke-width="2" fill="none">
    <path d="M 190 300 L 220 300" marker-end="url(#drel)"/>
    <path d="M 370 300 L 400 300" marker-end="url(#drel)"/>
    <path d="M 550 300 L 580 300" marker-end="url(#drel)"/>
    <path d="M 730 300 L 760 300" marker-end="url(#drel)"/>
  </g>
  <!-- loop back arrow -->
  <path d="M 860 332 Q 860 380 460 380 Q 60 380 60 340" stroke="#1d1815" stroke-width="2" fill="none" stroke-dasharray="5,5" marker-end="url(#drel)"/>
  <text x="460" y="398" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.5)">fix the issue → the next production output is better → score again</text>
  <defs>
    <marker id="drel" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d1815"/></marker>
  </defs>
</svg>
