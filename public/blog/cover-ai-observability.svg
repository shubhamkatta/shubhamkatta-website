<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Observability for AI: the dashboard that keeps you honest">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="460" y="30" width="260" height="22" rx="4" fill="#fff6db" opacity="0.9" transform="rotate(-2 590 41)"/>
  <g transform="translate(80,100) rotate(-1.5)">
    <rect width="480" height="380" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <!-- dashboard title -->
    <text x="24" y="38" font-family="Inter, sans-serif" font-weight="900" font-size="12" fill="rgba(29,24,21,0.4)" letter-spacing="2">LIVE DASHBOARD</text>
    <circle cx="432" cy="30" r="6" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
    <circle cx="450" cy="30" r="6" fill="#fff6db" stroke="#1d1815" stroke-width="1.5"/>
    <!-- metric card 1: Latency -->
    <g transform="translate(20,56)">
      <rect width="212" height="130" rx="14" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="16" y="28" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.5)" letter-spacing="2">LATENCY</text>
      <text x="16" y="62" font-family="ui-monospace, monospace" font-weight="800" font-size="32" fill="#1d1815">142</text>
      <text x="108" y="62" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="rgba(29,24,21,0.5)">ms p50</text>
      <text x="16" y="90" font-family="ui-monospace, monospace" font-weight="800" font-size="24" fill="rgba(29,24,21,0.7)">680</text>
      <text x="82" y="90" font-family="Inter, sans-serif" font-weight="600" font-size="14" fill="rgba(29,24,21,0.5)">ms p99</text>
      <!-- mini sparkline -->
      <polyline points="16,114 36,108 56,110 76,104 96,106 116,100 136,102 156,96 176,98 196,92" fill="none" stroke="#4a90d9" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- metric card 2: Tokens/req -->
    <g transform="translate(248,56)">
      <rect width="212" height="130" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="16" y="28" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.5)" letter-spacing="2">TOKENS / REQ</text>
      <text x="16" y="62" font-family="ui-monospace, monospace" font-weight="800" font-size="32" fill="#1d1815">1,247</text>
      <text x="16" y="84" font-family="Inter, sans-serif" font-weight="600" font-size="13" fill="rgba(29,24,21,0.5)">avg in+out</text>
      <!-- mini bar chart -->
      <rect x="16" y="96" width="18" height="22" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="40" y="100" width="18" height="18" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="64" y="92" width="18" height="26" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="88" y="96" width="18" height="22" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="112" y="88" width="18" height="30" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="136" y="94" width="18" height="24" rx="3" fill="#e8c44a" opacity="0.7"/>
      <rect x="160" y="86" width="18" height="32" rx="3" fill="#ff6b6b" opacity="0.7"/>
      <rect x="184" y="90" width="18" height="28" rx="3" fill="#e8c44a" opacity="0.7"/>
    </g>
    <!-- metric card 3: Cost/day -->
    <g transform="translate(20,202)">
      <rect width="212" height="130" rx="14" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="16" y="28" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.5)" letter-spacing="2">COST / DAY</text>
      <text x="16" y="66" font-family="ui-monospace, monospace" font-weight="800" font-size="36" fill="#1d1815">$18</text>
      <text x="92" y="66" font-family="ui-monospace, monospace" font-weight="600" font-size="20" fill="rgba(29,24,21,0.5)">.42</text>
      <!-- trend arrow down (good) -->
      <g transform="translate(160,44)">
        <rect width="36" height="22" rx="6" fill="#a3e4a3"/>
        <text x="18" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="11" fill="#1d1815">-8%</text>
      </g>
      <!-- mini area chart -->
      <polygon points="16,118 36,112 56,116 76,108 96,110 116,114 136,106 156,110 176,104 196,108 196,118" fill="rgba(255,107,107,0.15)" stroke="none"/>
      <polyline points="16,118 36,112 56,116 76,108 96,110 116,114 136,106 156,110 176,104 196,108" fill="none" stroke="#ff6b6b" stroke-width="2" stroke-linecap="round"/>
    </g>
    <!-- metric card 4: Error rate -->
    <g transform="translate(248,202)">
      <rect width="212" height="130" rx="14" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="16" y="28" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.5)" letter-spacing="2">ERROR RATE</text>
      <text x="16" y="66" font-family="ui-monospace, monospace" font-weight="800" font-size="36" fill="#1d1815">0.3</text>
      <text x="100" y="66" font-family="ui-monospace, monospace" font-weight="600" font-size="20" fill="rgba(29,24,21,0.5)">%</text>
      <!-- status dot -->
      <g transform="translate(160,44)">
        <rect width="36" height="22" rx="6" fill="#fff"/>
        <circle cx="12" cy="11" r="4" fill="#a3e4a3"/>
        <text x="26" y="16" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="10" fill="#1d1815">OK</text>
      </g>
      <!-- mini dots -->
      <circle cx="30" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="54" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="78" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="102" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="126" cy="106" r="4" fill="#ff6b6b" opacity="0.5"/>
      <circle cx="150" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="174" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
      <circle cx="198" cy="106" r="4" fill="#1d1815" opacity="0.15"/>
    </g>
    <!-- bottom status bar -->
    <text x="24" y="360" font-family="Inter, sans-serif" font-weight="600" font-size="11" fill="rgba(29,24,21,0.4)">last updated 3s ago  ·  model: claude-sonnet-4  ·  region: us-east-1</text>
  </g>
  <g transform="translate(620,170)">
    <text x="0" y="44" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">Observability</text>
    <text x="0" y="98" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">for AI.</text>
    <text x="0" y="152" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">the dashboard that keeps</text>
    <text x="0" y="180" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">you honest.</text>
    <text x="0" y="232" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">latency, tokens, cost, errors — the four</text>
    <text x="0" y="258" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">numbers you watch before everything else.</text>
  </g>
</svg>