<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="The LLM-last funnel: each stage shrinks what the model actually sees">
  <rect width="1000" height="460" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">The LLM-last funnel</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">the model is the most expensive, slowest, least predictable component. it should be the last resort, not the first reflex.</text>
  <g font-family="Inter, sans-serif" text-anchor="middle">
    <g transform="translate(310,96)">
      <rect width="380" height="46" rx="10" fill="#1d1815"/>
      <text x="190" y="29" font-weight="800" font-size="14" fill="#f6efe6">100M items ingested</text>
    </g>
    <g transform="translate(350,156)">
      <rect width="300" height="46" rx="10" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="150" y="22" font-weight="800" font-size="13" fill="#1d1815">rules + parsers</text>
      <text x="150" y="38" font-size="11" fill="rgba(29,24,21,0.6)">structured data stays deterministic · 0 calls</text>
    </g>
    <g transform="translate(390,216)">
      <rect width="220" height="46" rx="10" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="110" y="22" font-weight="800" font-size="13" fill="#1d1815">dedup vs history</text>
      <text x="110" y="38" font-size="11" fill="rgba(29,24,21,0.6)">enrich once, cache, reuse</text>
    </g>
    <g transform="translate(420,276)">
      <rect width="160" height="46" rx="10" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="80" y="22" font-weight="800" font-size="13" fill="#1d1815">cluster bursts</text>
      <text x="80" y="38" font-size="11" fill="rgba(29,24,21,0.6)">one call covers many</text>
    </g>
    <g transform="translate(440,336)">
      <rect width="120" height="46" rx="10" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="60" y="22" font-weight="800" font-size="13" fill="#1d1815">cheap model</text>
      <text x="60" y="38" font-size="11" fill="rgba(29,24,21,0.6)">handles the bulk</text>
    </g>
    <g transform="translate(455,396)">
      <rect width="90" height="40" rx="10" fill="#ff6b6b" stroke="#1d1815" stroke-width="2"/>
      <text x="45" y="25" font-weight="800" font-size="12" fill="#fff">big model</text>
    </g>
  </g>
  <g font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="rgba(29,24,21,0.55)" text-anchor="end">
    <text x="320" y="184">most of the volume →</text>
    <text x="360" y="244">repetition →</text>
    <text x="390" y="304">near-dupes →</text>
    <text x="410" y="364">novel tail →</text>
    <text x="425" y="421">ambiguous →</text>
  </g>
  <g font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="rgba(29,24,21,0.45)" text-anchor="start">
    <text x="700" y="424">a fraction of a fraction</text>
  </g>
</svg>
