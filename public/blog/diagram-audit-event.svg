<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 460" role="img" aria-label="Anatomy of an audit event">
  <rect width="1000" height="460" fill="#fff8ef"/>
  <text x="40" y="44" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Anatomy of an audit event: every field earns its place</text>
  <text x="40" y="68" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">one structured record per AI action. no optional fields. no "we'll add that later."</text>

  <!-- Identity fields group -->
  <g transform="translate(40,96)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">IDENTITY</text>
    <g transform="translate(0,24)">
      <rect width="280" height="56" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">timestamp</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">when — ISO 8601, always UTC</text>
    </g>
    <g transform="translate(0,88)">
      <rect width="280" height="56" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">request_id</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">trace it — connects to spans upstream</text>
    </g>
    <g transform="translate(0,152)">
      <rect width="280" height="56" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">actor</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">who triggered it — user + agent identity</text>
    </g>
  </g>

  <!-- Action fields group -->
  <g transform="translate(360,96)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">ACTION</text>
    <g transform="translate(0,24)">
      <rect width="280" height="56" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">action</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">what tool or operation was invoked</text>
    </g>
    <g transform="translate(0,88)">
      <rect width="280" height="56" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">model + model_version</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">which brain — exact version, not alias</text>
    </g>
    <g transform="translate(0,152)">
      <rect width="280" height="56" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">input_hash</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">what went in — hashed, not raw</text>
    </g>
    <g transform="translate(0,216)">
      <rect width="280" height="56" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">output</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">what came out — structured result</text>
    </g>
    <g transform="translate(0,280)">
      <rect width="280" height="56" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">decision</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">allow / deny — from policy engine</text>
    </g>
  </g>

  <!-- Measurement fields group -->
  <g transform="translate(680,96)">
    <text x="0" y="14" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">MEASUREMENT</text>
    <g transform="translate(0,24)">
      <rect width="280" height="56" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">latency_ms</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">how long — wall clock, end to end</text>
    </g>
    <g transform="translate(0,88)">
      <rect width="280" height="56" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">cost_usd</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">how much — tokens in + out, priced</text>
    </g>
    <g transform="translate(0,152)">
      <rect width="280" height="56" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="ui-monospace, monospace" font-weight="700" font-size="13" fill="#1d1815">metadata</text>
      <text x="14" y="42" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.6)">extra context — tags, session, env</text>
    </g>
  </g>

  <!-- Bottom caption bar -->
  <g transform="translate(40,420)">
    <rect width="920" height="30" rx="10" fill="#1d1815"/>
    <text x="14" y="20" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#a3e4a3">append-only. immutable. if you can edit the audit log, it is not an audit log.</text>
  </g>
</svg>