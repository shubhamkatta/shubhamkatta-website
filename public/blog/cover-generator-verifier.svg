<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The generator-verifier pattern">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="520" y="34" width="210" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 625 45)"/>
  <g transform="translate(90,150) rotate(-1.5)">
    <rect width="520" height="320" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="24" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">PROPOSE, THEN CHECK</text>
    <g transform="translate(30,70)">
      <rect width="150" height="64" rx="14" fill="#1d1815"/>
      <text x="75" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">GENERATOR</text>
      <text x="75" y="48" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#f6efe6">proposes</text>
    </g>
    <g transform="translate(340,70)">
      <rect width="150" height="64" rx="14" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="75" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.6)" letter-spacing="2">VERIFIER</text>
      <text x="75" y="48" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">decides</text>
    </g>
    <path d="M 180 102 L 340 102" stroke="#1d1815" stroke-width="2" fill="none" marker-end="url(#gvarrow)"/>
    <g transform="translate(30,176)">
      <rect width="460" height="50" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="20" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#ff6b6b" letter-spacing="2">DETERMINISTIC CHECK</text>
      <text x="20" y="40" font-family="ui-monospace, monospace" font-size="12" fill="#1d1815">CVE exists? indicator valid? source agrees?</text>
    </g>
    <g transform="translate(30,238)">
      <rect width="220" height="54" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.6)" letter-spacing="2">HIGH CONFIDENCE</text>
      <text x="110" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#1d1815">→ publish</text>
    </g>
    <g transform="translate(270,238)">
      <rect width="220" height="54" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="110" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.6)" letter-spacing="2">LOW CONFIDENCE</text>
      <text x="110" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#1d1815">→ ask a human</text>
    </g>
    <defs>
      <marker id="gvarrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d1815"/></marker>
    </defs>
  </g>
  <g transform="translate(660,196)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="52" fill="#1d1815" letter-spacing="-2">Generator</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-weight="900" font-size="52" fill="#1d1815" letter-spacing="-2">→ verifier.</text>
    <text x="0" y="172" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">the model proposes.</text>
    <text x="0" y="216" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.7)">it never gets the final word on</text>
    <text x="0" y="242" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.7)">anything you can actually check.</text>
  </g>
</svg>
