<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Hybrid retrieval and rerankers">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#ffe9e4" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(120,160)">
    <g><rect width="160" height="80" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="26" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">LEXICAL</text>
      <text x="14" y="50" font-family="ui-monospace, monospace" font-size="20" font-weight="900" fill="#1d1815">BM25</text>
      <text x="14" y="68" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)">exact matches</text>
    </g>
    <g transform="translate(180,0)"><rect width="160" height="80" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="26" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">SEMANTIC</text>
      <text x="14" y="50" font-family="ui-monospace, monospace" font-size="20" font-weight="900" fill="#1d1815">dense</text>
      <text x="14" y="68" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)">meaning</text>
    </g>
    <g transform="translate(80,120)"><rect width="180" height="60" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">FUSION</text>
      <text x="14" y="46" font-family="ui-monospace, monospace" font-size="18" font-weight="900" fill="#1d1815">RRF</text>
    </g>
    <g transform="translate(60,210)"><rect width="220" height="60" rx="14" fill="#1d1815"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="2">SECOND-STAGE SORT</text>
      <text x="14" y="46" font-family="ui-monospace, monospace" font-size="18" font-weight="900" fill="#f6efe6">cross-encoder rerank</text>
    </g>
    <g transform="translate(0,300)"><rect width="340" height="56" rx="14" fill="#ff6b6b"/>
      <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.7)" letter-spacing="2">TO THE PROMPT</text>
      <text x="14" y="44" font-family="ui-monospace, monospace" font-size="14" fill="#fff">top-k, deduplicated, ordered, cited</text>
    </g>
    <g stroke="#1d1815" stroke-width="2" fill="none">
      <path d="M 80 80 L 130 120"/>
      <path d="M 260 80 L 210 120"/>
      <line x1="170" y1="180" x2="170" y2="210"/>
      <line x1="170" y1="270" x2="170" y2="300"/>
    </g>
  </g>
  <g transform="translate(560,200)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">Hybrid retrieval</text>
    <text x="0" y="115" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">&amp; rerankers.</text>
    <text x="0" y="165" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">one retriever is never enough.</text>
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">BM25 + dense + RRF + cross-encoder.</text>
    <text x="0" y="246" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">measure it, then keep what earns its place.</text>
  </g>
</svg>
