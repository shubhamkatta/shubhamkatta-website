<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Hidden cost of long context cover">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <g transform="translate(80,130)">
    <rect width="500" height="340" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="22" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="rgba(29,24,21,0.5)" letter-spacing="2">CONTEXT vs LATENCY</text>
    <line x1="60" y1="280" x2="470" y2="280" stroke="#1d1815" stroke-width="2"/>
    <line x1="60" y1="280" x2="60" y2="80" stroke="#1d1815" stroke-width="2"/>
    <text x="22" y="300" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">0</text>
    <text x="190" y="300" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">100k</text>
    <text x="320" y="300" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">500k</text>
    <text x="430" y="300" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">1M</text>
    <path d="M 60 270 Q 180 240 280 200 T 460 90" stroke="#ff6b6b" stroke-width="4" fill="none" stroke-linecap="round"/>
    <circle cx="60" cy="270" r="5" fill="#1d1815"/>
    <circle cx="280" cy="200" r="5" fill="#1d1815"/>
    <circle cx="460" cy="90" r="5" fill="#1d1815"/>
    <text x="290" y="195" font-family="Inter, sans-serif" font-size="13" fill="#ff6b6b" font-weight="700">attention sinks here</text>
    <text x="22" y="100" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.55)">latency</text>
    <text x="380" y="270" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.55)">tokens</text>
  </g>
  <g transform="translate(640,150)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">The hidden cost</text>
    <text x="0" y="118" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">of long context.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">and what to do about it.</text>
    <text x="0" y="225" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">A million tokens is a permission,</text>
    <text x="0" y="252" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">not a recommendation.</text>
  </g>
</svg>
