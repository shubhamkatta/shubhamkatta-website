<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Honesty with cushions">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#fff6db" opacity="0.9" transform="rotate(-2 630 41)"/>
  <g transform="translate(110,170)">
    <path d="M 0 80 Q 40 0 200 0 T 400 80 Q 380 220 200 220 T 0 80 Z" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <path d="M 30 100 Q 80 40 200 40 Q 320 40 370 100" stroke="#ff6b6b" stroke-width="2" fill="none" opacity="0.5" stroke-dasharray="4,4"/>
    <text x="200" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="38" fill="#1d1815">honesty</text>
    <text x="200" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(29,24,21,0.6)">(but not the kind that lands hard)</text>
  </g>
  <g transform="translate(620,210)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">Honesty,</text>
    <text x="0" y="120" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">with cushions.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">what people often mean instead.</text>
  </g>
</svg>
