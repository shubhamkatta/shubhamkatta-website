<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Claude Code hooks and slash commands cover">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <g transform="translate(80,130) rotate(-2)">
    <rect width="480" height="340" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <rect width="480" height="46" rx="22" fill="#1d1815"/>
    <text x="22" y="30" font-family="ui-monospace, monospace" font-size="14" fill="#f6efe6">.claude/settings.json</text>
    <text x="22" y="80" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">{</text>
    <text x="22" y="104" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">  "permissions": {...},</text>
    <text x="22" y="128" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">  "hooks": {</text>
    <text x="22" y="152" font-family="ui-monospace, monospace" font-size="14" fill="#b3422f">    "PreToolUse": [...],</text>
    <text x="22" y="176" font-family="ui-monospace, monospace" font-size="14" fill="#b3422f">    "PostToolUse": [...],</text>
    <text x="22" y="200" font-family="ui-monospace, monospace" font-size="14" fill="#b3422f">    "Stop": [...]</text>
    <text x="22" y="224" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">  },</text>
    <text x="22" y="252" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">  "env": {...}</text>
    <text x="22" y="280" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">}</text>
    <rect x="280" y="246" width="180" height="58" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
    <text x="294" y="270" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#ff6b6b" letter-spacing="2">SLASH COMMANDS</text>
    <text x="294" y="292" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">/review · /loop · ...</text>
  </g>
  <g transform="translate(630,170)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">Hooks, slash</text>
    <text x="0" y="112" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">commands, settings.</text>
    <text x="0" y="166" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">the configuration you're missing.</text>
    <text x="0" y="222" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">Claude Code has a config surface that</text>
    <text x="0" y="248" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">most people never look at.</text>
  </g>
</svg>
