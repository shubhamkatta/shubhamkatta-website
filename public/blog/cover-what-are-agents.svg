<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="What are agents">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(120,180)">
    <circle cx="180" cy="120" r="6" fill="#ff6b6b"/>
    <circle cx="380" cy="60" r="6" fill="#1d1815"/>
    <g transform="translate(80,40)">
      <rect width="180" height="80" rx="18" fill="#1d1815"/>
      <text x="90" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(255,255,255,0.55)" letter-spacing="2">MODEL</text>
      <text x="90" y="60" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#f6efe6">decide</text>
    </g>
    <g transform="translate(320,40)">
      <rect width="180" height="80" rx="18" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="90" y="34" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">TOOLS</text>
      <text x="90" y="60" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">act</text>
    </g>
    <g transform="translate(200,160)">
      <rect width="180" height="60" rx="18" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="90" y="26" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">LOOP</text>
      <text x="90" y="46" text-anchor="middle" font-family="ui-monospace, monospace" font-size="14" fill="#1d1815">until done</text>
    </g>
    <path d="M 260 80 L 320 80" stroke="#1d1815" stroke-width="3" fill="none"/>
    <polygon points="320,80 308,74 308,86" fill="#1d1815"/>
    <path d="M 410 120 Q 460 160 380 190 L 290 190" stroke="#ff6b6b" stroke-width="3" fill="none" stroke-linecap="round" stroke-dasharray="6,6"/>
    <polygon points="290,190 302,184 302,196" fill="#ff6b6b"/>
    <path d="M 200 190 Q 130 180 120 130 L 160 90" stroke="#1d1815" stroke-width="3" fill="none" stroke-linecap="round"/>
    <polygon points="160,90 154,102 166,102" fill="#1d1815"/>
  </g>
  <g transform="translate(640,180)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="56" fill="#1d1815" letter-spacing="-2">What are</text>
    <text x="0" y="118" font-family="Inter, sans-serif" font-weight="900" font-size="56" fill="#1d1815" letter-spacing="-2">agents?</text>
    <text x="0" y="166" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">a model, some tools, and a loop.</text>
    <text x="0" y="222" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">most of the rest is operational craft.</text>
  </g>
</svg>
