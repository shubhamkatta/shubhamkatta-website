<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="RAG from scratch: every step of the retrieval-augmented generation pipeline explained simply">
  <rect width="1200" height="600" fill="#eaf7ff"/>
  <rect x="510" y="34" width="240" height="22" rx="4" fill="#fff6db" opacity="0.9" transform="rotate(-2 630 45)"/>
  <g transform="translate(80,156) rotate(-1.5)">
