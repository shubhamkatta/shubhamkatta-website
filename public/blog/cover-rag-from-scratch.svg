    <text x="24" y="38" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">THE PIPELINE IN SEVEN STEPS</text>
    <g font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="#1d1815">
      <g transform="translate(24,60)"><rect width="110" height="32" rx="8" fill="#fff6db" stroke="#1d1815" stroke-width="2"/><text x="55" y="21" text-anchor="middle">1 · load docs</text></g>
      <g transform="translate(148,60)"><rect width="110" height="32" rx="8" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/><text x="55" y="21" text-anchor="middle">2 · chunk</text></g>
      <g transform="translate(272,60)"><rect width="110" height="32" rx="8" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/><text x="55" y="21" text-anchor="middle">3 · embed</text></g>
      <g transform="translate(396,60)"><rect width="100" height="32" rx="8" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="50" y="21" text-anchor="middle">4 · store</text></g>
      <g transform="translate(24,110)"><rect width="140" height="32" rx="8" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="70" y="21" text-anchor="middle">5 · retrieve</text></g>
      <g transform="translate(178,110)"><rect width="140" height="32" rx="8" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/><text x="70" y="21" text-anchor="middle">6 · stuff prompt</text></g>
      <g transform="translate(332,110)"><rect width="164" height="32" rx="8" fill="#1d1815" stroke="#1d1815" stroke-width="2"/><text x="82" y="21" text-anchor="middle" fill="#f6efe6">7 · generate answer</text></g>
