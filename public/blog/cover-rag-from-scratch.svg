    <text x="24" y="262" font-family="Inter, sans-serif" font-size="12" fill="rgba(29,24,21,0.5)">fetch the right book first,</text>
    <text x="24" y="278" font-family="Inter, sans-serif" font-size="12" fill="rgba(29,24,21,0.5)">then answer. every step, with code.</text>
