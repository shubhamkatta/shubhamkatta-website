<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="You can be good at something and still be tired of it">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(140,180)">
    <polygon points="160,20 200,120 308,120 222,180 254,288 160,228 66,288 98,180 12,120 120,120" fill="#ffd166" stroke="#1d1815" stroke-width="2.5"/>
    <text x="160" y="160" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">"the one who"</text>
    <text x="160" y="186" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">does this thing</text>
    <text x="160" y="350" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(29,24,21,0.55)">— and is, quietly, done with it.</text>
  </g>
  <g transform="translate(540,180)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">Good at it, and</text>
    <text x="0" y="115" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">tired of it.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">competence as its own trap.</text>
    <text x="0" y="230" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">your usefulness sometimes</text>
    <text x="0" y="256" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">outgrows your affection.</text>
  </g>
</svg>
