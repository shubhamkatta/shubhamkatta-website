<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Evaluating RAG: the report card your pipeline needs">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="510" y="34" width="240" height="22" rx="4" fill="#a3e4a3" opacity="0.9" transform="rotate(-2 630 45)"/>
  <g transform="translate(80,156) rotate(-1.5)">
    <rect width="520" height="310" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="24" y="38" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">THREE GRADES, EVERY ANSWER</text>
    <g font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">
      <g transform="translate(24,60)"><rect width="472" height="60" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
        <text x="16" y="26">faithfulness</text>
        <text x="16" y="46" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">is the answer grounded in the context, or making stuff up?</text>
      </g>
      <g transform="translate(24,132)"><rect width="472" height="60" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
        <text x="16" y="26">answer relevancy</text>
        <text x="16" y="46" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">does it actually answer the question that was asked?</text>
      </g>
      <g transform="translate(24,204)"><rect width="472" height="60" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
        <text x="16" y="26">context recall</text>
        <text x="16" y="46" font-weight="400" font-size="11" fill="rgba(29,24,21,0.6)">did retrieval find the documents that matter?</text>
      </g>
    </g>
  </g>
  <g transform="translate(650,196)">
    <text x="0" y="48" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">Evaluating</text>
    <text x="0" y="106" font-family="Inter, sans-serif" font-weight="900" font-size="48" fill="#1d1815" letter-spacing="-2">RAG.</text>
    <text x="0" y="154" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">the report card nobody skips twice.</text>
    <text x="0" y="204" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.75)">faithfulness, relevancy, recall —</text>
    <text x="0" y="230" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.75)">and how to catch the silent drift.</text>
  </g>
</svg>
