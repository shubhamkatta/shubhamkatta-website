<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 380" role="img" aria-label="What to alert on: AI-specific failure modes">
  <rect width="1000" height="380" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">What to alert on — AI-specific failure modes</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">Four alerts that catch real problems before your users notice.</text>
  <!-- Card 1: Cost spike (top-left) -->
  <g transform="translate(40,90)">
    <rect width="440" height="110" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <rect x="0" y="14" width="5" height="82" rx="2.5" fill="#ff6b6b"/>
    <text x="24" y="32" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#1d1815">COST SPIKE</text>
    <g transform="translate(370,16)">
      <rect width="52" height="22" rx="6" fill="#ffe9e4"/>
      <text x="26" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="10" fill="#ff6b6b">ALERT</text>
    </g>
    <text x="24" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">cost/day jumps 3x</text>
    <text x="24" y="80" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">likely a loop or prompt bloat — someone added</text>
    <text x="24" y="98" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">a system prompt the size of a novel.</text>
  </g>
  <!-- Card 2: Latency degradation (top-right) -->
  <g transform="translate(510,90)">
    <rect width="450" height="110" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <rect x="0" y="14" width="5" height="82" rx="2.5" fill="#e8a44b"/>
    <text x="24" y="32" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#1d1815">LATENCY DEGRADATION</text>
    <g transform="translate(380,16)">
      <rect width="52" height="22" rx="6" fill="#fff6db"/>
      <text x="26" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="10" fill="#e8a44b">ALERT</text>
    </g>
    <text x="24" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">p99 doubles</text>
    <text x="24" y="80" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">model overload or retrieval bottleneck — the</text>
    <text x="24" y="98" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">vector DB is probably the quiet culprit.</text>
  </g>
  <!-- Card 3: Token anomaly (bottom-left) -->
  <g transform="translate(40,220)">
    <rect width="440" height="110" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <rect x="0" y="14" width="5" height="82" rx="2.5" fill="#4a90d9"/>
    <text x="24" y="32" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#1d1815">TOKEN ANOMALY</text>
    <g transform="translate(370,16)">
      <rect width="52" height="22" rx="6" fill="#eaf7ff"/>
      <text x="26" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="10" fill="#4a90d9">ALERT</text>
    </g>
    <text x="24" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">avg tokens/request spikes</text>
    <text x="24" y="80" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">prompt injection or runaway context — someone</text>
    <text x="24" y="98" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">is stuffing the window and you are paying for it.</text>
  </g>
  <!-- Card 4: Error rate (bottom-right) -->
  <g transform="translate(510,220)">
    <rect width="450" height="110" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <rect x="0" y="14" width="5" height="82" rx="2.5" fill="#1d1815"/>
    <text x="24" y="32" font-family="Inter, sans-serif" font-weight="900" font-size="14" fill="#1d1815">ERROR RATE</text>
    <g transform="translate(380,16)">
      <rect width="52" height="22" rx="6" fill="#1d1815"/>
      <text x="26" y="15" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="10" fill="#fff">ALERT</text>
    </g>
    <text x="24" y="56" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">4xx/5xx rate climbs</text>
    <text x="24" y="80" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">provider issue or rate limit hit — check if you</text>
    <text x="24" y="98" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">are retrying into a wall or the API is down.</text>
  </g>
  <!-- Caption -->
  <text x="40" y="360" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">Traditional alerts (CPU, memory, disk) still matter. These four catch the AI-specific failures that infrastructure monitoring misses entirely.</text>
</svg>