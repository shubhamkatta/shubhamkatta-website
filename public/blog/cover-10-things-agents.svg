<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="10 things to ensure you build agents right">
  <rect width="1200" height="600" fill="#fff6db"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#eaf7ff" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(100,140) rotate(-2)">
    <rect width="440" height="380" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="20" y="36" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRE-FLIGHT CHECKLIST</text>
    <line x1="20" y1="50" x2="420" y2="50" stroke="rgba(29,24,21,0.18)"/>
    <g font-family="Inter, sans-serif" font-size="14" fill="#1d1815">
      <g transform="translate(20,76)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">start with a workflow, not an agent</text></g>
      <g transform="translate(20,104)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">define stop conditions first</text></g>
      <g transform="translate(20,132)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">tool descriptions like a UX brief</text></g>
      <g transform="translate(20,160)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">cap context growth</text></g>
      <g transform="translate(20,188)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">observability before you need it</text></g>
      <g transform="translate(20,216)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">plan for partial failure</text></g>
      <g transform="translate(20,244)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">cheaper models for routing</text></g>
      <g transform="translate(20,272)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">evals on real workloads, not goldens</text></g>
      <g transform="translate(20,300)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">budgets per task: tokens, time, cost</text></g>
      <g transform="translate(20,328)"><rect width="16" height="16" rx="3" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/><text x="6" y="13" font-size="13">✓</text><text x="28" y="13">treat the agent like a teammate</text></g>
    </g>
    <text x="20" y="362" font-family="Inter, sans-serif" font-size="11" fill="rgba(29,24,21,0.55)">none of this is exciting. all of it is what holds up at 3am.</text>
  </g>
  <g transform="translate(600,200)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="64" fill="#1d1815" letter-spacing="-2">10 things</text>
    <text x="0" y="118" font-family="Inter, sans-serif" font-weight="900" font-size="32" fill="#1d1815" letter-spacing="-2">to ensure you're building</text>
    <text x="0" y="156" font-family="Inter, sans-serif" font-weight="900" font-size="32" fill="#1d1815" letter-spacing="-2">agents right.</text>
    <text x="0" y="210" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#ff6b6b">the boring layer that decides whether</text>
    <text x="0" y="236" font-family="Inter, sans-serif" font-weight="700" font-size="20" fill="#ff6b6b">they actually work in production.</text>
  </g>
</svg>
