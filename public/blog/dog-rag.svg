<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="RAG: Chip fetches the right book first, then the parrot reads it and answers correctly">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">RAG: fetch the right book first — then answer.</text>
  <!-- Chip head with book in mouth -->
  <g transform="translate(150,200) scale(0.84)">
    <ellipse cx="0" cy="92" rx="76" ry="15" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="-21" cy="-11" r="3" fill="#fff"/>
    <circle cx="27" cy="-11" r="3" fill="#fff"/>
    <path d="M -36 -22 Q -24 -28 -12 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -22 Q 24 -28 36 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <!-- book held in mouth -->
    <g transform="translate(0,44)">
      <rect x="-34" y="-8" width="68" height="40" rx="4" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/>
      <path d="M 0 -8 L 0 32" stroke="#1d1815" stroke-width="2"/>
      <path d="M -26 4 L -6 4 M -26 14 L -6 14 M 6 4 L 26 4 M 6 14 L 26 14" stroke="rgba(29,24,21,0.4)" stroke-width="1.6"/>
    </g>
  </g>
  <!-- arrow -->
  <path d="M 264 158 L 360 158" stroke="#1d1815" stroke-width="2.5" fill="none" marker-end="url(#drag)"/>
  <text x="312" y="146" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="11" fill="rgba(29,24,21,0.55)">hands it over</text>
  <!-- parrot reading + answering -->
  <g transform="translate(420,108)">
    <ellipse cx="60" cy="60" rx="58" ry="50" fill="#fff6db" stroke="#1d1815" stroke-width="2.5"/>
    <!-- parrot -->
    <g transform="translate(36,30)">
      <ellipse cx="14" cy="34" rx="20" ry="26" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <circle cx="14" cy="8" r="14" fill="#c6e84b" stroke="#1d1815" stroke-width="2"/>
      <path d="M 24 6 Q 36 8 26 18 Q 22 14 24 6 Z" fill="#ff9b3d" stroke="#1d1815" stroke-width="1.5"/>
      <circle cx="18" cy="6" r="2.5" fill="#1d1815"/>
      <path d="M -2 30 Q -14 40 -4 52" fill="#a3e4a3" stroke="#1d1815" stroke-width="1.5"/>
    </g>
    <!-- open book in front -->
    <g transform="translate(20,86)">
      <path d="M 40 0 L 6 6 L 6 28 L 40 22 Z" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <path d="M 40 0 L 74 6 L 74 28 L 40 22 Z" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    </g>
  </g>
  <g transform="translate(600,134)">
    <path d="M 0 22 Q 0 0 24 0 L 150 0 Q 174 0 174 22 L 174 44 Q 174 66 150 66 L 40 66 L 18 84 L 24 66 Q 0 66 0 44 Z" fill="#a3e4a3" stroke="#1d1815" stroke-width="2.5"/>
    <text x="87" y="32" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">reads the real</text>
    <text x="87" y="52" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">book. answers right.</text>
  </g>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">instead of guessing from memory, the parrot reads the book you fetched. fetch first, then answer. you're a dog — fetching is your whole thing.</text>
  <defs>
    <marker id="drag" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d1815"/></marker>
  </defs>
</svg>
