<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Designing for the right to be forgotten: data residency, DSAR, and erasure">
  <rect width="1200" height="600" fill="#fff6db"/>
  <rect x="510" y="34" width="240" height="22" rx="4" fill="#eaf7ff" opacity="0.9" transform="rotate(-2 630 45)"/>
  <g transform="translate(96,156) rotate(-1.5)">
    <rect width="480" height="312" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="24" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">A USER ASKS TO BE FORGOTTEN</text>
    <!-- folder -->
    <g transform="translate(40,72)">
      <path d="M 0 18 Q 0 6 12 6 L 70 6 L 84 22 L 180 22 Q 192 22 192 34 L 192 150 Q 192 162 180 162 L 12 162 Q 0 162 0 150 Z" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/>
      <text x="96" y="64" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">EU data</text>
      <text x="96" y="86" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">stays in EU</text>
      <text x="96" y="120" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">region in</text>
      <text x="96" y="138" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">the shard key</text>
    </g>
    <!-- eraser arrow -->
    <g transform="translate(252,118)">
      <path d="M 0 14 L 60 14" stroke="#1d1815" stroke-width="2.5" marker-end="url(#cra)"/>
    </g>
    <!-- erased -->
    <g transform="translate(322,76)">
      <rect width="124" height="156" rx="14" fill="#ffe9e4" stroke="#1d1815" stroke-width="2.5"/>
      <path d="M 30 64 L 94 64 M 24 92 L 100 92 M 34 120 L 90 120" stroke="rgba(29,24,21,0.3)" stroke-width="6" stroke-linecap="round"/>
      <text x="62" y="148" text-anchor="middle" font-family="Inter, sans-serif" font-weight="800" font-size="12" fill="#ff6b6b">erased</text>
    </g>
    <defs>
      <marker id="cra" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d1815"/></marker>
    </defs>
  </g>
  <g transform="translate(626,188)">
    <text x="0" y="48" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">The right to</text>
    <text x="0" y="102" font-family="Inter, sans-serif" font-weight="900" font-size="46" fill="#1d1815" letter-spacing="-2">be forgotten.</text>
    <text x="0" y="152" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">designed in, not bolted on.</text>
    <text x="0" y="200" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.75)">residency, erasure, and the</text>
    <text x="0" y="226" font-family="Inter, sans-serif" font-size="18" fill="rgba(29,24,21,0.75)">choices that make them tractable.</text>
  </g>
</svg>
