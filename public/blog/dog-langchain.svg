<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-label="Chip the golden retriever and the LangChain idea: snap ready-made steps together to get the treat">
  <rect width="800" height="320" rx="18" fill="#fff8ef"/>
  <text x="34" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="16" fill="#1d1815">LangChain: snap the ready-made steps together. step, step, step, treat.</text>
  <!-- Chip head -->
  <g transform="translate(150,200) scale(0.86)">
    <ellipse cx="0" cy="92" rx="76" ry="15" fill="rgba(29,24,21,0.07)"/>
    <path d="M -58 -44 C -102 -36 -112 50 -76 90 C -50 76 -40 10 -28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M 58 -44 C 102 -36 112 50 76 90 C 50 76 40 10 28 -22 Z" fill="#e8a44b" stroke="#1d1815" stroke-width="2.5"/>
    <ellipse cx="0" cy="0" rx="64" ry="60" fill="#f4c373" stroke="#1d1815" stroke-width="2.5"/>
    <path d="M -16 -54 Q 0 -70 16 -54 Q 8 -46 0 -48 Q -8 -46 -16 -54 Z" fill="#fad98c" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="0" cy="28" rx="42" ry="33" fill="#fdebc8" stroke="#1d1815" stroke-width="2.5"/>
    <circle cx="-24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="24" cy="-8" r="9" fill="#1d1815"/>
    <circle cx="-21" cy="-11" r="3" fill="#fff"/>
    <circle cx="27" cy="-11" r="3" fill="#fff"/>
    <path d="M -36 -22 Q -24 -28 -12 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <path d="M 12 -22 Q 24 -28 36 -22" fill="none" stroke="#1d1815" stroke-width="2" stroke-linecap="round"/>
    <ellipse cx="0" cy="18" rx="13" ry="9" fill="#1d1815"/>
    <ellipse cx="-4" cy="16" rx="3" ry="2" fill="rgba(255,255,255,0.5)"/>
    <path d="M 0 27 L 0 38 M 0 38 Q -16 50 -28 40 M 0 38 Q 16 50 28 40" fill="none" stroke="#1d1815" stroke-width="2.5" stroke-linecap="round"/>
    <path d="M -10 40 Q 0 60 10 40 Q 5 50 0 50 Q -5 50 -10 40 Z" fill="#ff9bb0" stroke="#1d1815" stroke-width="2"/>
  </g>
  <!-- snap-together steps -->
  <g font-family="Inter, sans-serif" font-weight="800" font-size="13" fill="#1d1815">
    <g transform="translate(270,128)"><rect width="92" height="56" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2.5"/><text x="46" y="26" text-anchor="middle">paw</text><text x="46" y="44" text-anchor="middle" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">the box</text></g>
    <g transform="translate(376,128)"><rect width="92" height="56" rx="12" fill="#eaf7ff" stroke="#1d1815" stroke-width="2.5"/><text x="46" y="26" text-anchor="middle">nose</text><text x="46" y="44" text-anchor="middle" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">it open</text></g>
    <g transform="translate(482,128)"><rect width="92" height="56" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2.5"/><text x="46" y="26" text-anchor="middle">grab</text><text x="46" y="44" text-anchor="middle" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">the treat</text></g>
    <g transform="translate(588,128)"><rect width="92" height="56" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2.5"/><text x="46" y="26" text-anchor="middle">chew</text><text x="46" y="44" text-anchor="middle" font-weight="400" font-size="10" fill="rgba(29,24,21,0.6)">happily</text></g>
  </g>
  <g stroke="#1d1815" stroke-width="2.5" fill="none">
    <path d="M 362 156 L 376 156"/>
    <path d="M 468 156 L 482 156"/>
    <path d="M 574 156 L 588 156"/>
  </g>
  <!-- treat bone at the end -->
  <g transform="translate(694,142)">
    <ellipse cx="22" cy="14" rx="16" ry="7" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="7" cy="8" r="6.5" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="7" cy="20" r="6.5" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="37" cy="8" r="6.5" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <circle cx="37" cy="20" r="6.5" fill="#fdebc8" stroke="#1d1815" stroke-width="2"/>
    <ellipse cx="22" cy="14" rx="12" ry="5" fill="#fdebc8"/>
  </g>
  <text x="270" y="226" font-family="Inter, sans-serif" font-weight="700" font-size="12" fill="rgba(29,24,21,0.55)">the steps already exist — you just snap them together like a toy.</text>
  <text x="34" y="298" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">prompt template = the same trick written down · chain = tricks in order · agent = the dog who picks the trick · retriever = the nose that fetches first.</text>
</svg>
