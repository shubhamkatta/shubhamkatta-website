<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="The strange relief of admitting you care">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(140,170)">
    <path d="M 20 60 Q 20 20 60 20 L 280 20 Q 320 20 320 60 L 320 160 Q 320 200 280 200 L 110 200 L 70 250 L 80 200 L 60 200 Q 20 200 20 160 Z" fill="#fff" stroke="#1d1815" stroke-width="2.5"/>
    <text x="170" y="100" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="22" fill="#1d1815">"yeah, it matters"</text>
    <text x="170" y="135" text-anchor="middle" font-family="Inter, sans-serif" font-size="14" fill="rgba(29,24,21,0.55)">that's it. that's the whole sentence.</text>
    <text x="170" y="170" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.45)">— costs ego, returns honesty.</text>
  </g>
  <g transform="translate(110,460)">
    <text x="0" y="40" font-family="Inter, sans-serif" font-weight="900" font-size="42" fill="#1d1815" letter-spacing="-2">The strange relief of admitting you care.</text>
  </g>
</svg>
