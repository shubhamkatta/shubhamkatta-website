<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="The control surface for managing agents">
  <rect width="1000" height="420" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">The control surface: the seven knobs you actually need</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">if the agent is "running" and these are not configured, it is running you.</text>
  <g transform="translate(40,100)" font-family="Inter, sans-serif">
    <g>
      <rect width="280" height="80" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PERMISSIONS</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">allow / ask / deny — per tool</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">side effects always ask. reads can auto.</text>
    </g>
    <g transform="translate(300,0)">
      <rect width="280" height="80" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">BUDGETS</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">tokens · time · cost · turns</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">hard caps. exceeded = stop, not "ask".</text>
    </g>
    <g transform="translate(600,0)">
      <rect width="280" height="80" rx="14" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">CHECKPOINTS</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">pause + report at known steps</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">"about to do X, confirm?"</text>
    </g>
    <g transform="translate(0,100)">
      <rect width="280" height="80" rx="14" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">AUDIT LOG</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">every action, queryable later</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">"what did it do at 14:22?"</text>
    </g>
    <g transform="translate(300,100)">
      <rect width="280" height="80" rx="14" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">KILL SWITCH</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">one command stops it cold</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">tested, not assumed.</text>
    </g>
    <g transform="translate(600,100)">
      <rect width="280" height="80" rx="14" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">ALERTS</text>
      <text x="14" y="46" font-size="13" fill="#1d1815">cost spike · loop · weird tool use</text>
      <text x="14" y="66" font-size="11" fill="rgba(29,24,21,0.55)">push, not pull.</text>
    </g>
    <g transform="translate(0,200)">
      <rect width="880" height="60" rx="14" fill="#1d1815"/>
      <text x="14" y="22" font-weight="900" font-size="11" fill="#a3e4a3" letter-spacing="2">REVIEW CADENCE · THE ONE PEOPLE SKIP</text>
      <text x="14" y="46" font-size="13" fill="#f6efe6">a real human reads a real sample of real runs on a real schedule. weekly is fine. quarterly is too late.</text>
    </g>
  </g>
  <g transform="translate(40,380)" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.78)">
    <text x="0" y="0">If you only have one: budgets. If two: budgets + audit log. If three: add review cadence. The rest scale with stakes.</text>
  </g>
</svg>
