<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 420" role="img" aria-label="The same plumbing across four SaaS apps">
  <rect width="1000" height="420" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Four SaaS apps. The plumbing is identical.</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">different stacks, different teams, same Lego bricks underneath</text>

  <g transform="translate(40,100)" font-family="Inter, sans-serif">
    <g>
      <text x="0" y="14" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT A</text>
      <rect x="0" y="24" width="220" height="22" rx="6" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815">auth · tenants · RBAC · billing · audit · jobs</text>
      <rect x="0" y="52" width="220" height="22" rx="6" fill="#fff" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="68" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">domain logic for THIS product</text>
    </g>
    <g transform="translate(240,0)">
      <text x="0" y="14" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT B</text>
      <rect x="0" y="24" width="220" height="22" rx="6" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815">auth · tenants · RBAC · billing · audit · jobs</text>
      <rect x="0" y="52" width="220" height="22" rx="6" fill="#fff" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="68" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">domain logic for THIS product</text>
    </g>
    <g transform="translate(480,0)">
      <text x="0" y="14" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT C</text>
      <rect x="0" y="24" width="220" height="22" rx="6" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815">auth · tenants · RBAC · billing · audit · jobs</text>
      <rect x="0" y="52" width="220" height="22" rx="6" fill="#fff" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="68" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">domain logic for THIS product</text>
    </g>
    <g transform="translate(720,0)">
      <text x="0" y="14" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT D</text>
      <rect x="0" y="24" width="220" height="22" rx="6" fill="#ffe9e4" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="40" font-family="ui-monospace, monospace" font-size="11" fill="#1d1815">auth · tenants · RBAC · billing · audit · jobs</text>
      <rect x="0" y="52" width="220" height="22" rx="6" fill="#fff" stroke="#1d1815" stroke-width="1"/>
      <text x="8" y="68" font-family="ui-monospace, monospace" font-size="11" fill="rgba(29,24,21,0.6)">domain logic for THIS product</text>
    </g>
  </g>

  <text x="40" y="220" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">WHAT IF THE RED ROW WAS WRITTEN ONCE?</text>
  <g transform="translate(40,238)">
    <rect width="900" height="80" rx="16" fill="#1d1815"/>
    <text x="20" y="32" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="#ff6b6b" letter-spacing="2">PLYNTH · ONE BACKEND, MANY PRODUCTS</text>
    <text x="20" y="58" font-family="ui-monospace, monospace" font-size="14" fill="#a3e4a3">auth · multi-tenancy · RBAC · billing · credits · audit · jobs · admin</text>
    <text x="20" y="76" font-family="Inter, sans-serif" font-size="12" fill="rgba(255,255,255,0.6)">isolated by (product_id, tenant_id) at the repository layer</text>
  </g>
  <g transform="translate(40,340)">
    <rect width="220" height="60" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT A</text>
    <text x="14" y="44" font-family="Inter, sans-serif" font-size="13" fill="#1d1815">domain only</text>
  </g>
  <g transform="translate(280,340)">
    <rect width="220" height="60" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT B</text>
    <text x="14" y="44" font-family="Inter, sans-serif" font-size="13" fill="#1d1815">domain only</text>
  </g>
  <g transform="translate(520,340)">
    <rect width="220" height="60" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT C</text>
    <text x="14" y="44" font-family="Inter, sans-serif" font-size="13" fill="#1d1815">domain only</text>
  </g>
  <g transform="translate(760,340)">
    <rect width="180" height="60" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="14" y="22" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">PRODUCT D</text>
    <text x="14" y="44" font-family="Inter, sans-serif" font-size="13" fill="#1d1815">domain only</text>
  </g>
