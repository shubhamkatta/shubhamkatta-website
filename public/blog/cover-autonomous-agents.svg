<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="Autonomous agents">
  <rect width="1200" height="600" fill="#ffe9e4"/>
  <rect x="540" y="30" width="180" height="22" rx="4" fill="#fff6db" opacity="0.85" transform="rotate(-2 630 41)"/>
  <g transform="translate(100,140) rotate(-1)">
    <rect width="520" height="340" rx="22" fill="#fff" stroke="#1d1815" stroke-width="2"/>
    <text x="20" y="36" font-family="Inter, sans-serif" font-weight="900" font-size="13" fill="rgba(29,24,21,0.55)" letter-spacing="2">A LONG-RUNNING AGENT</text>
    <g transform="translate(40,60)">
      <rect width="120" height="56" rx="12" fill="#1d1815"/>
      <text x="60" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(255,255,255,0.5)" letter-spacing="2">MODEL</text>
      <text x="60" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#f6efe6">decide</text>
    </g>
    <g transform="translate(200,60)">
      <rect width="120" height="56" rx="12" fill="#ffd166" stroke="#1d1815" stroke-width="2"/>
      <text x="60" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.6)" letter-spacing="2">TOOLS</text>
      <text x="60" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">act</text>
    </g>
    <g transform="translate(360,60)">
      <rect width="120" height="56" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="60" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.6)" letter-spacing="2">ENV</text>
      <text x="60" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">observe</text>
    </g>
    <g transform="translate(120,160)">
      <rect width="280" height="46" rx="12" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="140" y="20" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="rgba(29,24,21,0.55)" letter-spacing="2">MEMORY</text>
      <text x="140" y="38" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">scratchpad · long-term · index</text>
    </g>
    <g transform="translate(120,230)">
      <rect width="280" height="56" rx="12" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="140" y="22" text-anchor="middle" font-family="Inter, sans-serif" font-weight="900" font-size="11" fill="#ff6b6b" letter-spacing="2">STOP CONDITIONS</text>
      <text x="140" y="42" text-anchor="middle" font-family="ui-monospace, monospace" font-size="13" fill="#1d1815">goal met · budget hit · ask human</text>
    </g>
    <path d="M 100 90 L 200 90 M 320 90 L 360 90" stroke="#1d1815" stroke-width="2" fill="none"/>
    <path d="M 420 116 Q 480 160 400 200 L 320 200" stroke="#ff6b6b" stroke-width="2" fill="none" stroke-dasharray="5,5"/>
  </g>
  <g transform="translate(660,180)">
    <text x="0" y="50" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">Autonomous</text>
    <text x="0" y="118" font-family="Inter, sans-serif" font-weight="900" font-size="50" fill="#1d1815" letter-spacing="-2">agents.</text>
    <text x="0" y="170" font-family="Inter, sans-serif" font-weight="700" font-size="22" fill="#ff6b6b">model + tools + memory + env.</text>
    <text x="0" y="220" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">and a stop condition that earns</text>
    <text x="0" y="246" font-family="Inter, sans-serif" font-size="17" fill="rgba(29,24,21,0.7)">its place at the top.</text>
  </g>
</svg>
