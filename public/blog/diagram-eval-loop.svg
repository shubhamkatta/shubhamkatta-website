<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" role="img" aria-label="Evaluation as a continuous loop, not a one-time gate">
  <rect width="1000" height="440" fill="#fff8ef"/>
  <text x="40" y="46" font-family="Inter, sans-serif" font-weight="900" font-size="20" fill="#1d1815">Evaluation is a heartbeat, not a gate</text>
  <text x="40" y="70" font-family="Inter, sans-serif" font-size="13" fill="rgba(29,24,21,0.6)">sample live traffic, score it asynchronously, alert on regression, feed borderline cases back into the benchmark.</text>
  <g font-family="Inter, sans-serif">
    <g transform="translate(40,110)">
      <rect width="170" height="56" rx="12" fill="#1d1815"/>
      <text x="85" y="24" text-anchor="middle" font-weight="900" font-size="11" fill="rgba(255,255,255,0.55)" letter-spacing="1">PRODUCTION TRAFFIC</text>
      <text x="85" y="44" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#f6efe6">sample a %</text>
    </g>
    <path d="M 210 138 L 256 138" stroke="#1d1815" stroke-width="2" marker-end="url(#delar)"/>
    <g transform="translate(266,84)">
      <rect width="220" height="44" rx="11" fill="#fff6db" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="20" font-weight="800" font-size="12" fill="#1d1815">QUALITY</text>
      <text x="14" y="36" font-size="11" fill="rgba(29,24,21,0.6)">deterministic check · faithfulness</text>
    </g>
    <g transform="translate(266,138)">
      <rect width="220" height="44" rx="11" fill="#eaf7ff" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="20" font-weight="800" font-size="12" fill="#1d1815">RELIABILITY</text>
      <text x="14" y="36" font-size="11" fill="rgba(29,24,21,0.6)">failure rate · malformed · p95/p99</text>
    </g>
    <g transform="translate(266,192)">
      <rect width="220" height="44" rx="11" fill="#ffe9e4" stroke="#1d1815" stroke-width="2"/>
      <text x="14" y="20" font-weight="800" font-size="12" fill="#1d1815">SAFETY</text>
      <text x="14" y="36" font-size="11" fill="rgba(29,24,21,0.6)">harm · policy · leakage · adversarial</text>
    </g>
    <path d="M 486 138 L 532 138" stroke="#1d1815" stroke-width="2" marker-end="url(#delar)"/>
    <g transform="translate(542,110)">
      <rect width="190" height="56" rx="12" fill="#a3e4a3" stroke="#1d1815" stroke-width="2"/>
      <text x="95" y="24" text-anchor="middle" font-weight="900" font-size="11" fill="#1d1815" letter-spacing="1">DASHBOARD + ALERT</text>
      <text x="95" y="44" text-anchor="middle" font-size="11" fill="rgba(29,24,21,0.7)">regression → someone gets paged</text>
    </g>
    <path d="M 732 138 L 778 138" stroke="#1d1815" stroke-width="2" marker-end="url(#delar)"/>
    <g transform="translate(788,110)">
      <rect width="172" height="56" rx="12" fill="#fff" stroke="#1d1815" stroke-width="2"/>
      <text x="86" y="24" text-anchor="middle" font-weight="900" font-size="11" fill="#1d1815" letter-spacing="1">HUMAN REVIEW</text>
      <text x="86" y="44" text-anchor="middle" font-size="11" fill="rgba(29,24,21,0.7)">borderline cases</text>
    </g>
    <path d="M 874 166 L 874 300 Q 874 330 844 330 L 180 330 Q 150 330 150 300 L 150 176"
          fill="none" stroke="#ff6b6b" stroke-width="2.5" stroke-dasharray="7,6" marker-end="url(#delarr)"/>
    <text x="512" y="322" text-anchor="middle" font-family="Inter, sans-serif" font-weight="700" font-size="13" fill="#ff6b6b">reviews sharpen the benchmark — the eval set keeps getting better</text>
  </g>
  <defs>
    <marker id="delar" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#1d1815"/></marker>
    <marker id="delarr" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#ff6b6b"/></marker>
  </defs>
</svg>
